name: Docker CI

on:
  push:
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/docker-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/docker-ci.yml"

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t marketplace-ai-backend:ci ./backend

      - name: Build frontend image
        run: docker build -t marketplace-ai-frontend:ci ./frontend