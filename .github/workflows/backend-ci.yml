name: Backend CI

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: marketplace_ai_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d marketplace_ai_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    defaults:
      run:
        working-directory: backend

    env:
      APP_ENV: test
      BACKEND_PORT: 8081
      WORKER_METRICS_PORT: 9091
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/marketplace_ai_test?sslmode=disable
      MIGRATIONS_PATH: ./migrations
      REDIS_ADDR: localhost:6379
      REDIS_PASSWORD: ""
      REDIS_DB: 0
      S3_ENDPOINT: localhost:19000
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: minio123
      S3_BUCKET_RAW: raw-payloads
      S3_BUCKET_EXPORTS: exports
      S3_BUCKET_ARTIFACTS: artifacts
      S3_USE_SSL: "false"
      JWT_SECRET: test-secret
      ENCRYPTION_KEY: test-encryption-key
      SENTRY_DSN: ""
      SENTRY_RELEASE: ci
      OTEL_ENABLED: "false"
      OTEL_EXPORTER_OTLP_ENDPOINT: ""
      OTEL_SERVICE_NAME: marketplace-ai-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Download modules
        run: go mod download

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Install migrate CLI
        run: |
          go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Run migrations
        run: |
          migrate -path ./migrations -database "$DATABASE_URL" up

      - name: Run tests
        run: go test ./...

      - name: Build API
        run: go build -o ./bin/api ./cmd/api

      - name: Build Worker
        run: go build -o ./bin/worker ./cmd/worker